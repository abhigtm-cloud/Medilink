<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="medilink">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>medilink</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase SDK: must load before Flutter so Dart firebase_core can use it -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <!-- Performance API polyfills for compatibility -->
  <script>
    // Polyfill performance API
    if (!window.performance) window.performance = {};
    if (!window.performance.clearMarks) window.performance.clearMarks = function() {};
    if (!window.performance.mark) window.performance.mark = function() {};
    if (!window.performance.measure) window.performance.measure = function() {};
    if (!window.performance.clearMeasures) window.performance.clearMeasures = function() {};
    if (!window.performance.getEntriesByName) window.performance.getEntriesByName = function() { return []; };
    if (!window.performance.getEntriesByType) window.performance.getEntriesByType = function() { return []; };
    
    // Polyfill mgt object (measurement/metrics tracking)
    if (!window.mgt) window.mgt = {};
    if (!window.mgt.clearMarks) window.mgt.clearMarks = function() {};
    if (!window.mgt.mark) window.mgt.mark = function() {};
    if (!window.mgt.measure) window.mgt.measure = function() {};
    if (!window.mgt.clearMeasures) window.mgt.clearMeasures = function() {};
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
